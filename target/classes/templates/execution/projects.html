<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Execution - Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-info">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">BOMS</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/executive/proposals">Proposals</a>
                <a class="nav-link" href="/execution/projects">Projects</a>
                <a class="nav-link" href="/execution/my-tasks">My Tasks</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Project Management</h2>
        
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        
        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Project Name</th>
                        <th>Client</th>
                        <th>Budget</th>
                        <th>Status</th>
                        <th>Start Date</th>
                        <th>Manager</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="project : ${projects}">
                        <td th:text="${project.id}"></td>
                        <td th:text="${project.name}"></td>
                        <td th:text="${project.proposal?.client}"></td>
                        <td th:text="${project.budget != null ? '$' + project.budget : 'N/A'}"></td>
                        <td>
                            <span class="badge" th:classappend="${project.status.name() == 'PENDING' ? 'bg-warning' : 
                                                                project.status.name() == 'IN_PROGRESS' ? 'bg-info' : 
                                                                project.status.name() == 'COMPLETED' ? 'bg-success' : 'bg-secondary'}"
                                  th:text="${project.status}"></span>
                        </td>
                        <td th:text="${project.startDate != null ? project.startDate : 'Not set'}"></td>
                        <td th:text="${project.projectManager?.fullName}"></td>
                        <td>
                            <a th:href="@{/execution/projects/{id}(id=${project.id})}" class="btn btn-primary btn-sm">View</a>
                            <form th:if="${project.status.name() != 'COMPLETED'}" 
                                  th:action="@{/execution/projects/{id}/complete(id=${project.id})}" 
                                  method="post" style="display: inline;">
                                <button type="submit" class="btn btn-success btn-sm" 
                                        onclick="return confirm('Mark this project as completed?')">Complete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div th:if="${#lists.isEmpty(projects)}" class="alert alert-info">
                No projects assigned yet.
            </div>
        </div>
    </div>
</body>
</html>
