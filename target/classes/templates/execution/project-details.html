<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Project Details - BOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-info">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">BOMS</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/executive/proposals">Proposals</a>
                <a class="nav-link" href="/execution/projects">Projects</a>
                <a class="nav-link" href="/execution/my-tasks">My Tasks</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h4 th:text="${project.name}">Project Name</h4>
                    </div>
                    <div class="card-body">
                        <p><strong>Client:</strong> <span th:text="${project.proposal?.client}"></span></p>
                        <p><strong>Budget:</strong> <span th:text="${project.budget != null ? '$' + project.budget : 'N/A'}"></span></p>
                        <p><strong>Status:</strong> 
                            <span class="badge bg-info" th:text="${project.status}"></span>
                        </p>
                        <p><strong>Start Date:</strong> <span th:text="${project.startDate}"></span></p>
                        <p><strong>Manager:</strong> <span th:text="${project.projectManager?.fullName}"></span></p>
                    </div>
                </div>
                
                <!-- Tasks Section -->
                <div class="card mt-4">
                    <div class="card-header">
                        <h5>Project Tasks</h5>
                    </div>
                    <div class="card-body">
                        <table class="table table-sm">
                            <thead>
                                <tr>
                                    <th>Task</th>
                                    <th>Assigned To</th>
                                    <th>Status</th>
                                    <th>Progress</th>
                                    <th>Due Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="task : ${tasks}">
                                    <td th:text="${task.title}"></td>
                                    <td th:text="${task.assignedTo?.fullName}"></td>
                                    <td><span class="badge bg-secondary" th:text="${task.status}"></span></td>
                                    <td th:text="${task.progressPercentage + '%'}"></td>
                                    <td th:text="${task.dueDate}"></td>
                                    <td>
                                        <button type="button" class="btn btn-sm btn-outline-primary" 
                                                data-bs-toggle="modal" th:data-bs-target="'#updateModal' + ${task.id}">
                                            Update
                                        </button>
                                        
                                        <!-- Update Modal -->
                                        <div class="modal fade" th:id="'updateModal' + ${task.id}">
                                            <div class="modal-dialog">
                                                <div class="modal-content">
                                                    <form th:action="@{/execution/tasks/{id}/update(id=${task.id})}" method="post">
                                                        <div class="modal-header">
                                                            <h5 class="modal-title">Update Task</h5>
                                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                                        </div>
                                                        <div class="modal-body">
                                                            <div class="mb-3">
                                                                <label class="form-label">Status</label>
                                                                <select name="status" class="form-select">
                                                                    <option value="TODO">To Do</option>
                                                                    <option value="IN_PROGRESS">In Progress</option>
                                                                    <option value="COMPLETED">Completed</option>
                                                                    <option value="BLOCKED">Blocked</option>
                                                                </select>
                                                            </div>
                                                            <div class="mb-3">
                                                                <label class="form-label">Progress (%)</label>
                                                                <input type="number" name="progress" class="form-control" 
                                                                       min="0" max="100" th:value="${task.progressPercentage}">
                                                            </div>
                                                        </div>
                                                        <div class="modal-footer">
                                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                                            <button type="submit" class="btn btn-primary">Update</button>
                                                        </div>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <!-- Add New Task -->
                <div class="card">
                    <div class="card-header">
                        <h5>Add New Task</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/execution/projects/{id}/tasks(id=${project.id})}" method="post" th:object="${newTask}">
                            <div class="mb-3">
                                <label class="form-label">Task Title</label>
                                <input type="text" class="form-control" th:field="*{title}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Assign To</label>
                                <select class="form-select" th:field="*{assignedTo}">
                                    <option value="">Select Team Member</option>
                                    <option th:each="member : ${executionTeam}" 
                                            th:value="${member.id}" th:text="${member.fullName}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Due Date</label>
                                <input type="date" class="form-control" th:field="*{dueDate}">
                            </div>
                            <button type="submit" class="btn btn-primary">Add Task</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
