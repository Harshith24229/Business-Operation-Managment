<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>System Logs - BOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">BOMS</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/admin/dashboard">Dashboard</a>
                <a class="nav-link" href="/admin/users">Users</a>
                <a class="nav-link" href="/admin/analytics">Analytics</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>System Audit Logs</h2>
        
        <div class="table-responsive mt-3">
            <table class="table table-striped table-sm">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Timestamp</th>
                        <th>User</th>
                        <th>Action</th>
                        <th>Description</th>
                        <th>IP Address</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="log : ${logs}">
                        <td th:text="${log.id}"></td>
                        <td th:text="${#temporals.format(log.timestamp, 'yyyy-MM-dd HH:mm:ss')}"></td>
                        <td th:text="${log.user != null ? log.user.username : 'System'}"></td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${log.action.contains('LOGIN') ? 'bg-info' : 
                                                 log.action.contains('CREATED') ? 'bg-success' : 
                                                 log.action.contains('APPROVED') ? 'bg-primary' : 
                                                 log.action.contains('COMPLETED') ? 'bg-warning' : 'bg-secondary'}"
                                  th:text="${log.action}"></span>
                        </td>
                        <td th:text="${log.description}"></td>
                        <td th:text="${log.ipAddress ?: 'N/A'}"></td>
                    </tr>
                </tbody>
            </table>
            
            <div th:if="${#lists.isEmpty(logs)}" class="alert alert-info">
                No system logs available.
            </div>
        </div>
    </div>
</body>
</html>
