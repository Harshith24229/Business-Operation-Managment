<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Executive - Proposals Review</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">BOMS</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/executive/proposals">Proposals</a>
                <a class="nav-link" href="/execution/projects">Projects</a>
                <a class="nav-link" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Proposals for Review</h2>
        
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        
        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Project Title</th>
                        <th>Client</th>
                        <th>Estimated Cost</th>
                        <th>Duration</th>
                        <th>Created By</th>
                        <th>Created Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="proposal : ${proposals}">
                        <td th:text="${proposal.id}"></td>
                        <td th:text="${proposal.projectTitle}"></td>
                        <td th:text="${proposal.client}"></td>
                        <td th:text="${proposal.estimatedCost != null ? '$' + proposal.estimatedCost : 'N/A'}"></td>
                        <td th:text="${proposal.duration ?: 'N/A'}"></td>
                        <td th:text="${proposal.createdBy?.fullName}"></td>
                        <td th:text="${#temporals.format(proposal.createdDate, 'yyyy-MM-dd HH:mm')}"></td>
                        <td>
                            <form th:action="@{/executive/proposals/{id}/approve(id=${proposal.id})}" method="post" style="display: inline;">
                                <button type="submit" class="btn btn-success btn-sm" onclick="return confirm('Are you sure you want to approve this proposal?')">Approve</button>
                            </form>
                            <form th:action="@{/executive/proposals/{id}/reject(id=${proposal.id})}" method="post" style="display: inline;">
                                <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to reject this proposal?')">Reject</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div th:if="${#lists.isEmpty(proposals)}" class="alert alert-info">
                No proposals pending for review.
            </div>
        </div>
    </div>
</body>
</html>
