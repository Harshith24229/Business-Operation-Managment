<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Proposal - BOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">BOMS</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard">Dashboard</a>
                <a class="nav-link" href="/sales/inquiries">Inquiries</a>
                <a class="nav-link" href="/sales/proposals">Proposals</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h3>Create Project Proposal</h3>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <h5>Client Information</h5>
                            <p><strong>Name:</strong> <span th:text="${inquiry.name}"></span></p>
                            <p><strong>Email:</strong> <span th:text="${inquiry.email}"></span></p>
                            <p><strong>Phone:</strong> <span th:text="${inquiry.phone}"></span></p>
                            <p><strong>Message:</strong> <span th:text="${inquiry.message}"></span></p>
                        </div>
                        
                        <hr>
                        
                        <form th:action="@{/sales/proposals/save}" method="post" th:object="${proposal}">
                            <input type="hidden" name="inquiryId" th:value="${inquiry.id}">
                            
                            <div class="mb-3">
                                <label for="projectTitle" class="form-label">Project Title *</label>
                                <input type="text" class="form-control" id="projectTitle" name="projectTitle" 
                                       th:field="*{projectTitle}" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="client" class="form-label">Client *</label>
                                <input type="text" class="form-control" id="client" name="client" 
                                       th:field="*{client}" th:value="${inquiry.name}" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="estimatedCost" class="form-label">Estimated Cost ($)</label>
                                <input type="number" step="0.01" class="form-control" id="estimatedCost" 
                                       name="estimatedCost" th:field="*{estimatedCost}">
                            </div>
                            
                            <div class="mb-3">
                                <label for="duration" class="form-label">Duration</label>
                                <input type="text" class="form-control" id="duration" name="duration" 
                                       th:field="*{duration}" placeholder="e.g., 2 weeks, 1 month">
                            </div>
                            
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a th:href="@{/sales/inquiries}" class="btn btn-secondary me-md-2">Cancel</a>
                                <button type="submit" class="btn btn-primary">Create Proposal</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
