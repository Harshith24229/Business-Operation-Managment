<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inquiries - BOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">BOMS</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard">Dashboard</a>
                <a class="nav-link" href="/sales/proposals">Proposals</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Customer Inquiries</h2>
        
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        
        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Message</th>
                        <th>Status</th>
                        <th>Assigned To</th>
                        <th>Created Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="inquiry : ${inquiries}">
                        <td th:text="${inquiry.id}"></td>
                        <td th:text="${inquiry.name}"></td>
                        <td th:text="${inquiry.email}"></td>
                        <td th:text="${inquiry.phone}"></td>
                        <td th:text="${#strings.abbreviate(inquiry.message, 50)}"></td>
                        <td>
                            <span class="badge" th:classappend="${inquiry.status.name() == 'PENDING' ? 'bg-warning' : 
                                                                inquiry.status.name() == 'IN_DISCUSSION' ? 'bg-info' : 
                                                                inquiry.status.name() == 'CONVERTED' ? 'bg-success' : 'bg-danger'}"
                                  th:text="${inquiry.status}"></span>
                        </td>
                        <td th:text="${inquiry.assignedTo?.fullName ?: 'Unassigned'}"></td>
                        <td th:text="${#temporals.format(inquiry.createdDate, 'yyyy-MM-dd HH:mm')}"></td>
                        <td>
                            <div class="btn-group">
                                <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" 
                                        th:data-bs-target="'#assignModal' + ${inquiry.id}">Assign</button>
                                <button type="button" class="btn btn-sm btn-outline-success" data-bs-toggle="modal" 
                                        th:data-bs-target="'#statusModal' + ${inquiry.id}">Status</button>
                                <a th:if="${inquiry.status.name() == 'CONVERTED'}" 
                                   th:href="@{/sales/proposals/create/{id}(id=${inquiry.id})}" 
                                   class="btn btn-sm btn-success">Create Proposal</a>
                            </div>
                            
                            <!-- Modals for each inquiry -->
                            <div class="modal fade" th:id="'assignModal' + ${inquiry.id}">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <form th:action="@{/sales/inquiries/{id}/assign(id=${inquiry.id})}" method="post">
                                            <div class="modal-header">
                                                <h5 class="modal-title">Assign Inquiry</h5>
                                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                            </div>
                                            <div class="modal-body">
                                                <select name="assignedToId" class="form-select" required>
                                                    <option value="">Select Sales Executive</option>
                                                    <option th:each="user : ${salesTeam}" th:value="${user.id}" th:text="${user.fullName}"></option>
                                                </select>
                                            </div>
                                            <div class="modal-footer">
                                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                                <button type="submit" class="btn btn-primary">Assign</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="modal fade" th:id="'statusModal' + ${inquiry.id}">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <form th:action="@{/sales/inquiries/{id}/status(id=${inquiry.id})}" method="post">
                                            <div class="modal-header">
                                                <h5 class="modal-title">Update Status</h5>
                                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                            </div>
                                            <div class="modal-body">
                                                <select name="status" class="form-select" required>
                                                    <option value="PENDING">Pending</option>
                                                    <option value="IN_DISCUSSION">In Discussion</option>
                                                    <option value="CONVERTED">Converted</option>
                                                    <option value="REJECTED">Rejected</option>
                                                </select>
                                            </div>
                                            <div class="modal-footer">
                                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                                <button type="submit" class="btn btn-primary">Update</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
