<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - BOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">BOMS</a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3" sec:authentication="name"></span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Dashboard</h2>
        
        <div class="row mt-4">
            <div sec:authorize="hasRole('ADMIN')" class="col-md-4">
                <div class="card bg-primary text-white">
                    <div class="card-body text-center">
                        <h5>Admin Panel</h5>
                        <p>Manage users and system</p>
                        <a href="/admin/dashboard" class="btn btn-light">Access</a>
                    </div>
                </div>
            </div>
            
            <div sec:authorize="hasRole('SALES_TEAM')" class="col-md-4">
                <div class="card bg-success text-white">
                    <div class="card-body text-center">
                        <h5>Sales Management</h5>
                        <p>Handle inquiries and proposals</p>
                        <a href="/sales/inquiries" class="btn btn-light">Access</a>
                    </div>
                </div>
            </div>
            
            <div sec:authorize="hasRole('EXECUTIVE_TEAM')" class="col-md-4">
                <div class="card bg-warning text-dark">
                    <div class="card-body text-center">
                        <h5>Project Director</h5>
                        <p>Approve proposals & manage projects</p>
                        <a href="/executive/proposals" class="btn btn-dark">Access</a>
                    </div>
                </div>
            </div>
            
            <div sec:authorize="hasRole('EXECUTIVE_TEAM')" class="col-md-4">
                <div class="card bg-info text-white">
                    <div class="card-body text-center">
                        <h5>Project Management</h5>
                        <p>Execute projects and assign tasks</p>
                        <a href="/execution/projects" class="btn btn-light">Access</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
