<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Management - BOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">BOMS</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/admin/dashboard">Dashboard</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>User Management</h2>
        
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        
        <!-- Add New User -->
        <div class="card mb-4">
            <div class="card-header">
                <h5>Add New User</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/users}" method="post" th:object="${newUser}">
                    <div class="row">
                        <div class="col-md-3">
                            <input type="text" class="form-control" placeholder="Username" th:field="*{username}" required>
                        </div>
                        <div class="col-md-3">
                            <input type="password" class="form-control" placeholder="Password" th:field="*{password}" required>
                        </div>
                        <div class="col-md-3">
                            <input type="email" class="form-control" placeholder="Email" th:field="*{email}" required>
                        </div>
                        <div class="col-md-2">
                            <select class="form-select" th:field="*{role}" required>
                                <option value="">Select Role</option>
                                <option value="ADMIN">Admin</option>
                                <option value="SALES_TEAM">Sales Team</option>
                                <option value="EXECUTIVE_TEAM">Executive Team</option>
                            </select>
                        </div>
                        <div class="col-md-1">
                            <button type="submit" class="btn btn-primary">Add</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Users List -->
        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Full Name</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Created Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.username}"></td>
                        <td th:text="${user.email}"></td>
                        <td th:text="${user.fullName}"></td>
                        <td><span class="badge bg-info" th:text="${user.role}"></span></td>
                        <td>
                            <span class="badge" th:classappend="${user.enabled ? 'bg-success' : 'bg-danger'}"
                                  th:text="${user.enabled ? 'Active' : 'Disabled'}"></span>
                        </td>
                        <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}"></td>
                        <td>
                            <form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post" style="display: inline;">
                                <button type="submit" class="btn btn-sm" 
                                        th:classappend="${user.enabled ? 'btn-warning' : 'btn-success'}"
                                        th:text="${user.enabled ? 'Disable' : 'Enable'}"></button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
