<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Tasks - BOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-info">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">BOMS</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/executive/proposals">Proposals</a>
                <a class="nav-link" href="/execution/projects">Projects</a>
                <a class="nav-link" href="/execution/my-tasks">My Tasks</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>My Tasks</h2>
        
        <div class="table-responsive mt-3">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Task</th>
                        <th>Project</th>
                        <th>Status</th>
                        <th>Progress</th>
                        <th>Due Date</th>
                        <th>Created</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="task : ${tasks}">
                        <td>
                            <strong th:text="${task.title}"></strong>
                            <br>
                            <small class="text-muted" th:text="${task.description}"></small>
                        </td>
                        <td th:text="${task.project?.name}"></td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${task.status.name() == 'TODO' ? 'bg-secondary' : 
                                                 task.status.name() == 'IN_PROGRESS' ? 'bg-info' : 
                                                 task.status.name() == 'COMPLETED' ? 'bg-success' : 'bg-danger'}"
                                  th:text="${task.status}"></span>
                        </td>
                        <td>
                            <div class="progress" style="height: 20px;">
                                <div class="progress-bar" role="progressbar" 
                                     th:style="'width: ' + ${task.progressPercentage} + '%'"
                                     th:text="${task.progressPercentage + '%'}"></div>
                            </div>
                        </td>
                        <td th:text="${task.dueDate != null ? task.dueDate : 'No due date'}"></td>
                        <td th:text="${#temporals.format(task.createdAt, 'yyyy-MM-dd')}"></td>
                    </tr>
                </tbody>
            </table>
            
            <div th:if="${#lists.isEmpty(tasks)}" class="alert alert-info">
                No tasks assigned to you yet.
            </div>
        </div>
    </div>
</body>
</html>
